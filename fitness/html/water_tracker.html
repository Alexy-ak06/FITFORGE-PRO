<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Intake Tracker</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-button">← Back to Home</a>

    <h1>Water Intake Tracker</h1>

    <form id="waterForm">
      <div class="form-group">
        <label for="glasses">Number of glasses of water</label>
        <input type="number" id="glasses" required>
      </div>

      <button type="submit">Track Water Intake</button>
    </form>

    <h2 id="result"></h2>
  </div>

  <script>
    document.getElementById("waterForm").addEventListener("submit", function(e) {
      e.preventDefault();

      let glasses = document.getElementById("glasses").value;
      let litres = (glasses * 0.25).toFixed(2);

      document.getElementById("result").innerText =
        "You drank " + litres + " litres of water today.";
    });
  </script>
</body>
</html>
